

<style>

/* ── FILTERS ── */
.filters {
  display: flex; flex-wrap: wrap; gap: var(--spacing-2xs);
  justify-content: center;
  padding: var(--spacing) var(--spacing-l);
  border-bottom: 1px solid var(--mono-border1);
  background: var(--mono-surface2);
  position: sticky; top: var(--nav-size); z-index: 40;
}
.filter-btn {
  font: 300 var(--f-xs) var(--f-mono);
  text-transform: uppercase; letter-spacing: .1em;
  padding: var(--spacing-3xs) var(--spacing-xs);
  border: 1px solid var(--mono-border2);
  background: var(--mono-component1);
  color: var(--mono-text1);
  border-radius: var(--br-tag);
  cursor: pointer;
  transition: var(--transition-ease);
}
.filter-btn:hover, .filter-btn.active {
  background: var(--grupo-color, var(--accent-solid1));
  border-color: var(--grupo-color, var(--accent-solid1));
  color: var(--mono-text1);
}
.filter-btn[data-grupo="primigenios"] { --grupo-color: var(--primigenios); }
.filter-btn[data-grupo="arquitectos"] { --grupo-color: var(--arquitectos); }
.filter-btn[data-grupo="sabios"]       { --grupo-color: var(--sabios); }
.filter-btn[data-grupo="caoticos"]     { --grupo-color: var(--caoticos); }
.filter-btn[data-grupo="exterminadores"] { --grupo-color: var(--exterminadores); }
.filter-btn.active { box-shadow: 0 0 0 3px color-mix(in srgb, var(--grupo-color, var(--accent-solid1)), transparent 60%); }

/* ── GRID ── */
.pnj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--spacing);
  padding: var(--spacing-xl) var(--spacing-l);
  max-width: 1200px;
  margin: 0 auto;
}

/* ──cards ── */
.pnj-card {
  background: var(--mono-surface2);
  border: 1px solid var(--mono-border1);
  border-radius: var(--br);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition-ease);
  position: relative;
  display: flex; flex-direction: column;
  container-type: inline-size;
}
.pnj-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
  border-color: var(--accent-border2);
}
.pnj-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 50%, color-mix(in srgb, var(--grupo-color, var(--accent-solid1)), transparent 30%) 100%);
  pointer-events: none; z-index: 1;
  opacity: 0; transition: opacity .5s ease;
}
.pnj-card:hover::before { opacity: 1; }

.card-img-wrap {
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--mono-component1);
  position: relative;
}
.card-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .7s ease;
}
.pnj-card:hover .card-img-wrap img { transform: scale(1.04); }

.card-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem; color: var(--mono-border2);
}

.card-grupo-tag {
  position: absolute; top: var(--spacing-xs); left: var(--spacing-xs);
  background: var(--grupo-color, var(--accent-solid1));
  color: var(--mono-text1);
  font: 300 var(--f-xs) var(--f-mono);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 2px var(--spacing-2xs);
  border-radius: var(--br-tag);
  z-index: 2;
}

.card-body {
  padding: var(--spacing-s);
  flex: 1; display: flex; flex-direction: column; gap: var(--spacing-2xs);
  position: relative; z-index: 2;
}
.card-nombre {
  font: italic var(--f-l) var(--f-deco);
  color: var(--mono-text2);
  line-height: 1.2;
}
.card-meta {
  font: 300 var(--f-xs) var(--f-mono);
  color: var(--mono-text1);
  display: flex; gap: var(--spacing-xs); flex-wrap: wrap;
}
.card-meta span { display: flex; align-items: center; gap: .3em; }
.card-desc {
  font: 300 var(--f-s) var(--f-sans);
  color: var(--mono-text1);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.card-footer {
  margin-top: auto;
  padding-top: var(--spacing-xs);
  border-top: 1px solid var(--mono-border1);
  display: flex; justify-content: flex-end;
}
.card-order-badge {
  font: var(--f-xs) var(--f-mono);
  color: var(--mono-solid1);
}

/* ──si nada── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: var(--spacing-2xl);
  color: var(--mono-text1);
}
.empty-state .icon { font-size: 3rem; margin-bottom: var(--spacing-s); opacity: .4; }
.empty-state p { font: 300 var(--f-s) var(--f-mono); letter-spacing: .1em; text-transform: uppercase; }

/* ── detalle carta ── */
.detalle-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
}
.detalle-overlay.open {
  opacity: 1; pointer-events: all;
}
.detalle-carta {
  position: fixed; top: 0; right: 0;
  height: 100vh; width: min(520px, 100vw);
  background: var(--mono-surface1);
  border-left: 1px solid var(--mono-border1);
  z-index: 101;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.detalle-carta.open { transform: translateX(0); }

.detalle-img-wrap {
  aspect-ratio: 3/2;
  overflow: hidden;
  background: var(--mono-component1);
  position: relative;
}
.detalle-img-wrap img { width:100%;height:100%;object-fit:cover; }
.detalle-img-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, var(--mono-surface1));
}
.detalle-content { padding: var(--spacing-l); }
.detalle-grupo-tag {
  display: inline-block;
  background: var(--grupo-color, var(--accent-solid1));
  color:var(--mono-text1);
  font: 300 var(--f-xs) var(--f-mono);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 3px var(--spacing-2xs);
  border-radius: var(--br-tag);
  margin-bottom: var(--spacing-xs);
}
.detalle-nombre {
  font: italic var(--f-3xl) var(--f-deco);
  line-height: 1.1;
  margin-bottom: var(--spacing-xs);
}
.detalle-meta {
  display: flex; flex-wrap: wrap; gap: var(--spacing-xs);
  margin-bottom: var(--spacing);
  font: 300 var(--f-xs) var(--f-mono);
  color: var(--mono-text1);
  text-transform: uppercase; letter-spacing: .08em;
}
.detalle-meta span { display: flex; align-items: center; gap: .3em; }
.detalle-divider {
  border: none; border-top: 1px solid var(--mono-border1);
  margin: var(--spacing) 0;
}
.detalle-historia {
  font: 300 var(--f-base) var(--f-sans);
  color: var(--mono-text2);
  line-height: 1.7;
}
.detalle-close {
  position: absolute; top: var(--spacing-s); right: var(--spacing-s);
  background: var(--mono-component2); border: 1px solid var(--mono-border2);
  color: var(--mono-text2); width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--br-tag); cursor: pointer; z-index: 5;
  font-size: 1.1rem;
  transition: var(--transition-ease);
}
.detalle-close:hover { background: var(--mono-component3); }

/* ── LOADER ── */
.loader {
  grid-column: 1/-1;
  display: flex; justify-content: center; padding: var(--spacing-2xl);
}
.loader-dots { display: flex; gap: .5rem; }
.loader-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-solid1);
  animation: bounce 1.2s infinite;
}
.loader-dots span:nth-child(2) { animation-delay: .2s; }
.loader-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity: .5; }
  30% { transform: translateY(-8px); opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .pnj-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: var(--spacing-xs); padding: var(--spacing-s); }
  .detalle-carta { width: 100vw; }
}
</style>

<nav class="site-nav">
  <a class="brand" href="#">Spectra</a>
  <ul class="nav-links">
    <li><a href="#">Inicio</a></li>
    <li><a href="#">Memberlist</a></li>
    <li><a href="#">PNJs</a></li>
  </ul>
</nav>

<header class="page-header">
  <h1>Personajes</h1>
  <p>No jugables · Spectra</p>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-grupo="all">Todos</button>
  <button class="filter-btn" data-grupo="primigenios">Primigenios</button>
  <button class="filter-btn" data-grupo="arquitectos">Arquitectos</button>
  <button class="filter-btn" data-grupo="sabios">Sabios</button>
  <button class="filter-btn" data-grupo="caoticos">Caóticos</button>
  <button class="filter-btn" data-grupo="exterminadores">Exterminadores</button>
</div>

<div class="pnj-grid" id="pnjGrid">
  <div class="loader">
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- abrir carta -->
<div class="detalle-overlay" id="detalleOverlay" onclick="closedetalle()"></div>
<div class="detalle-carta" id="detallecarta">
  <button class="detalle-close" onclick="closedetalle()"><i class="bi bi-x"></i></button>
  <div class="detalle-img-wrap">
    <img id="detalleImg" src="" alt="">
    <div class="detalle-img-gradient"></div>
  </div>
  <div class="detalle-content">
    <span class="detalle-grupo-tag" id="detalleGrupo"></span>
    <div class="detalle-nombre" id="detallenombre"></div>
    <div class="detalle-meta" id="detalleMeta"></div>
    <hr class="detalle-divider">
    <div class="detalle-historia" id="detalleHistoria"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyA_DTdVWhe54PRrPlFFmIkdbMuotiSssZU",
  authDomain: "spectra-85df4.firebaseapp.com",
  projectId: "spectra-85df4",
  storageBucket: "spectra-85df4.firebasestorage.app",
  messagingSenderId: "321843589344",
  appId: "1:321843589344:web:714ca78124d8aef4d66085"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const GRUPOS_COLOR = {
  primigenios: '#A53E67', arquitectos: '#0C459C',
  sabios: '#00674E', caoticos: '#5A4160',
  exterminadores: '#A53E4A'
};

let allPNJs = [];
let activeFilter = 'all';

async function loadPNJs() {
  try {
    const q = query(collection(db, 'pnjs'), orderBy('orden', 'asc'));
    const snap = await getDocs(q);
    allPNJs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    // Fallback without ordering if field doesn't exist yet
    const snap = await getDocs(collection(db, 'pnjs'));
    allPNJs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allPNJs.sort((a,b) => (a.orden||0) - (b.orden||0));
  }
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('pnjGrid');
  const filtered = activeFilter === 'all' ? allPNJs : allPNJs.filter(p => p.grupo === activeFilter);

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon"><i class="bi bi-person-slash"></i></div>
        <p>No hay personajes en este parlamento</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const color = GRUPOS_COLOR[p.grupo] || '#b5a081';
    return `
      <article class="pnj-card" style="--grupo-color:${color}" onclick="opendetalle('${p.id}')" 
               data-grupo="${p.grupo||''}" data-order="${p.orden||i}">
        <div class="card-img-wrap">
          ${p.imagen
            ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">`
            : `<div class="card-img-placeholder"><i class="bi bi-person"></i></div>`}
          <span class="card-grupo-tag">${p.grupo||'—'}</span>
        </div>
        <div class="card-body">
          <div class="card-nombre">${p.nombre||'Sin nombre'}</div>
          <div class="card-meta">
            ${p.edad ? `<span><i class="bi bi-hourglass-split"></i>${p.edad}</span>` : ''}
            ${p.ocupacion ? `<span><i class="bi bi-briefcase"></i>${p.ocupacion}</span>` : ''}
          </div>
          ${p.historia ? `<p class="card-desc">${p.historia}</p>` : ''}
        </div>
      </article>`;
  }).join('');
}

// ──filtra ──
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.grupo;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderGrid();
});

// ──detalle──
window.opendetalle = (id) => {
  const p = allPNJs.find(x => x.id === id);
  if (!p) return;
  const color = GRUPOS_COLOR[p.grupo] || '#b5a081';

  const cartaGrupo = document.getElementById('detalleGrupo');
  cartaGrupo.textContent = p.grupo || '—';
  cartaGrupo.style.setProperty('--grupo-color', color);
  document.getElementById('detallecarta').style.setProperty('--grupo-color', color);

  const img = document.getElementById('detalleImg');
  if (p.imagen) { img.src = p.imagen; img.style.display = 'block'; }
  else { img.style.display = 'none'; }

  document.getElementById('detallenombre').textContent = p.nombre || 'Sin nombre';
  document.getElementById('detalleMeta').innerHTML = [
    p.edad ? `<span><i class="bi bi-hourglass-split"></i>${p.edad}</span>` : '',
    p.ocupacion ? `<span><i class="bi bi-briefcase"></i>${p.ocupacion}</span>` : '',
  ].join('');
  document.getElementById('detalleHistoria').textContent = p.historia || 'Sin descripción.';

  document.getElementById('detalleOverlay').classList.add('open');
  document.getElementById('detallecarta').classList.add('open');
};

window.closedetalle = () => {
  document.getElementById('detalleOverlay').classList.remove('open');
  document.getElementById('detallecarta').classList.remove('open');
};

loadPNJs();
</script>
