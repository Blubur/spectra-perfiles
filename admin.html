<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyA_DTdVWhe54PRrPlFFmIkdbMuotiSssZU",
  authDomain: "spectra-85df4.firebaseapp.com",
  projectId: "spectra-85df4",
  storageBucket: "spectra-85df4.firebasestorage.app",
  messagingSenderId: "321843589344",
  appId: "1:321843589344:web:714ca78124d8aef4d66085"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// El nombre del array que lee tu tienda (definido en SHOP_CONFIG.itemsKey)
const ITEMS_KEY = 'TIENDA_HABILIDADES';

(async () => {
  try {
    const q    = query(collection(db, 'tienda_items'), orderBy('orden', 'asc'));
    const snap = await getDocs(q);

    // Convierte cada documento Firestore al formato exacto que espera /19559.js
    window[ITEMS_KEY] = snap.docs.map(d => {
      const data = d.data();
      return {
        id:          data.itemId      || d.id,
        nombre:      data.nombre      || '',
        categoria:   data.categoria   || '',
        tipo:        data.tipo        || '',
        precio:      data.precio      ?? 0,
        descripcion: data.descripcion || '',
        bonus:       data.bonus       || '',
        tags:        data.tags        || [],
        // imagen: prioriza URL; si no, usa el SVG inline guardado en admin
        imagen:      data.imagen_url  || data.imagen_svg || ''
      };
    });

  } catch (e) {
    console.warn('[Spectra Tienda] Firebase falló, tienda vacía:', e);
    window[ITEMS_KEY] = [];
  }

  // ── Carga /19559.js AHORA que el array ya existe ──
  const s    = document.createElement('script');
  s.src      = '/19559.js';
  s.onerror  = () => console.error('[Spectra Tienda] No se pudo cargar /19559.js');
  document.body.appendChild(s);
})();
</script>
